<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- App icon: full-bleed dark background (safe for "maskable" cropping) with
       a neon gradient rounded square and the BoonTweet "b" mark. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#e879f9"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="#07070d"/>
  <rect x="106" y="106" width="300" height="300" rx="72" fill="url(#g)"/>
  <text x="256" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="210" font-weight="800" text-anchor="middle" fill="#07070d">b</text>
</svg>
